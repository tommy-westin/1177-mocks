version: "3.9"

services:
  vvh-mocks:
    build: .
    ports:
      - "8088:8088"
    environment:
      MOCK_PORT: "8088"
      MOCK_HOST: "${MOCK_HOST:-http://localhost:8088}"
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: "${CF_TUNNEL_TOKEN}"
    depends_on:
      - vvh-mocks
    restart: unless-stopped
